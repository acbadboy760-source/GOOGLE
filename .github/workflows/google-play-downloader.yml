name: Google Play Downloader (Modern)

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'شناسه App ID گوگل پلی (مثلاً com.deepseek.chat)'
        required: true
        default: 'com.deepseek.chat'
  schedule:
    - cron: '0 2 * * 0'  # هر یکشنبه ساعت ۲ صبح UTC

jobs:
  download-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install google-play-scraper
        run: |
          pip install google-play-scraper

      - name: Download APK from Google Play
        run: |
          APP_ID="${{ github.event.inputs.app_id || 'com.deepseek.chat' }}"
          echo "📱 Downloading $APP_ID ..."
          python -c "
          from google_play_scraper import download
          import os

          os.makedirs('apk-output', exist_ok=True)
          filename = 'apk-output/${APP_ID}.apk'
          result = download('${APP_ID}', filename)
          print(f'✅ Downloaded: {result}')
          " || { echo "❌ Download failed, trying alternative method..."; exit 1; }

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-apk
          path: apk-output/
